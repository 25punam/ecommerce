<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --background: #f5f7fa;
            --primary-color: #4f8cff;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        body {
            background: var(--background);
            font-family: "Poppins", Arial, sans-serif;
            color: #22223b;
            margin: 0;
        }
        .payment-container {
            max-width: 500px;
            margin: 48px auto;
            padding: 32px;
            background: #fff;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .payment-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .payment-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        .order-details {
            background: #f7f7f7;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .order-details p {
            margin: 8px 0;
            font-size: 0.95rem;
        }
        .amount-display {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            text-align: center;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 12px;
            margin: 16px 0;
        }
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn-primary {
            flex: 1;
            background: var(--primary-color);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-secondary {
            flex: 1;
            background: #e0e0e0;
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 24px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h1>Complete Your Payment</h1>
            <p>Secure payment via Razorpay</p>
        </div>

        <div class="order-details">
            <p><strong>Order ID:</strong> {{ order.id }}</p>
            <p><strong>Total Amount:</strong> <span class="amount-display">₹{{ amount }}</span></p>
        </div>

        <form id="payment-form" method="POST">
            {% csrf_token %}
            <input type="hidden" id="razorpay_payment_id" name="razorpay_payment_id">
            <input type="hidden" id="razorpay_order_id" name="razorpay_order_id" value="{{ order_id }}">
            <input type="hidden" id="razorpay_signature" name="razorpay_signature">
        </form>

        <div class="btn-container">
            <button class="btn-primary" id="rzp-button1">Pay Now (₹{{ amount }})</button>
            <a href="{% url 'payment_cancel' %}" class="btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                Cancel Payment
            </a>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your payment...</p>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        const rzpButton = document.getElementById('rzp-button1');
        const paymentForm = document.getElementById('payment-form');
        const loadingDiv = document.getElementById('loading');

        rzpButton.addEventListener('click', function() {
            const options = {
                key: 'rzp_test_drrQ8dUerWW3jC',
                amount: {{ amount }} * 100,
                currency: 'INR',
                name: 'E-Commerce Store',
                description: 'Order Payment',
                order_id: '{{ order_id }}',
                prefill: {
                    name: '{{ user.username }}',
                    email: '{{ user.email }}'
                },
                handler: function(response) {
                    // Payment successful
                    loadingDiv.style.display = 'block';
                    rzpButton.disabled = true;
                    
                    document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                    document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                    document.getElementById('razorpay_signature').value = response.razorpay_signature;
                    
                    // Submit form to payment_success endpoint
                    paymentForm.action = '{% url "payment_success" %}';
                    paymentForm.submit();
                },
                modal: {
                    ondismiss: function() {
                        // User closed payment modal without completing
                        console.log('Payment cancelled by user');
                        window.location.href = '{% url "payment_cancel" %}';
                    }
                },
                theme: {
                    color: '#4f8cff'
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        });
    </script>
</body>
</html>
