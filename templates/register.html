<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  </head>
  <body>
    <section class="container">
        <div class="login-container">
            <div class="circle circle-one"></div>
            <div class="form-container">
                <h1 class="opacity">REGISTER</h1>
               
                <!-- Django Messages Framework Display -->
                {% if messages %}
                    <div id="messagesContainer" style="margin-bottom: 16px;">
                        {% for message in messages %}
                            <div style="background-color: {% if message.tags %}{% if 'error' in message.tags %}#f8d7da{% elif 'success' in message.tags %}#d4edda{% else %}#d1ecf1{% endif %}{% else %}#d1ecf1{% endif %}; border: 1px solid {% if message.tags %}{% if 'error' in message.tags %}#f5c6cb{% elif 'success' in message.tags %}#c3e6cb{% else %}#bee5eb{% endif %}{% else %}#bee5eb{% endif %}; border-radius: 8px; padding: 12px; margin-bottom: 12px; color: {% if message.tags %}{% if 'error' in message.tags %}#721c24{% elif 'success' in message.tags %}#155724{% else %}#0c5460{% endif %}{% else %}#0c5460{% endif %}; display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 1.2rem;">{% if message.tags %}{% if 'error' in message.tags %}⚠️{% elif 'success' in message.tags %}✓{% else %}ℹ️{% endif %}{% else %}ℹ️{% endif %}</span>
                                <span>{{ message }}</span>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
                
                <form method="POST" action="" id="registerForm" onsubmit="return validateForm()">
                    {% csrf_token %}
                    
                    <div style="display: flex; flex-direction: column;">
                        <input 
                            type="text" 
                            name="username" 
                            id="username" 
                            placeholder="Username" 
                            required
                            minlength="3"
                            title="Username must be at least 3 characters"
                        >
                        <span id="usernameError" class="error-message" style="display: none; color: #dc3545; font-size: 0.85rem; margin-top: 4px;"></span>
                    </div>
                    
                    <div style="display: flex; flex-direction: column;">
                        <input 
                            type="email" 
                            name="email" 
                            id="email" 
                            placeholder="Email Address" 
                            required
                            title="Please enter a valid email address"
                        >
                        <span id="emailError" class="error-message" style="display: none; color: #dc3545; font-size: 0.85rem; margin-top: 4px;"></span>
                    </div>
                    
                    <div style="display: flex; flex-direction: column;">
                        <input 
                            type="password" 
                            name="password" 
                            id="password" 
                            placeholder="Password" 
                            required
                            minlength="6"
                            title="Password must be at least 6 characters"
                        >
                        <span id="passwordError" class="error-message" style="display: none; color: #dc3545; font-size: 0.85rem; margin-top: 4px;"></span>
                    </div>
                    
                    <button class="opacity" type="submit">SUBMIT</button>
                    <div class="register-forget opacity">
                        <a href="{% url 'user_login' %}">LOGIN</a>
                        <a href="{% url 'home' %}" style="margin-left: auto;">Back to Home</a>
                    </div>
                </form>
        
            </div>
            <div class="circle circle-two"></div>
        </div>
        <div class="theme-btn-container"></div>
        <style>
            :root {
                --background: #f5f7fa;
                --primary-color: #4f8cff;
                --accent-color: #ff6f61;
                --card-bg: #fff;
                --shadow: 0 4px 24px rgba(0,0,0,0.08);
            }
            * {
                box-sizing: border-box;
            }
            html {
                scroll-behavior: smooth;
            }
            body {
                margin: 0;
                font-family: "Poppins", Arial, sans-serif;
                background: var(--background);
                color: #22223b;
                letter-spacing: 0.5px;
            }
            .login-container {
                max-width: 400px;
                margin: 48px auto;
                padding: 32px;
                background: var(--card-bg);
                border-radius: 16px;
                box-shadow: var(--shadow);
            }
            .form-container h1 {
                color: var(--primary-color);
                font-weight: 700;
                margin-bottom: 24px;
            }
            .form-container form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .form-container input {
                border-radius: 12px;
                padding: 0.75rem 1rem;
                font-size: 1rem;
                border: 1px solid #e0e0e0;
                margin-bottom: 1rem;
            }
            .form-container input:focus {
                border-color: var(--primary-color);
                box-shadow: 0 0 0 2px rgba(79,140,255,0.15);
            }
            .form-container button {
                background: var(--primary-color);
                color: #fff;
                border: none;
                border-radius: 24px;
                font-weight: 600;
                font-size: 1.1rem;
                padding: 0.75rem 2rem;
                transition: background 0.2s;
            }
            .form-container button:hover {
                background: #2563eb;
            }
            .register-forget a {
                color: var(--accent-color);
                font-weight: 500;
                margin-right: 1rem;
            }
            .register-forget a:hover {
                text-decoration: underline;
            }
            @media (max-width: 768px) {
                .login-container {
                    padding: 12px;
                    border-radius: 0;
                }
            }
        </style>

          
        </style>
        <script>
            // Debounce helper function to avoid too many AJAX requests
            function debounce(func, delay) {
                let timeoutId;
                return function(...args) {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => func.apply(this, args), delay);
                };
            }

            // Frontend validation for registration form
            function validateForm() {
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                
                // Clear previous error messages
                document.getElementById('usernameError').style.display = 'none';
                document.getElementById('emailError').style.display = 'none';
                document.getElementById('passwordError').style.display = 'none';
                
                let isValid = true;
                
                // Validate username
                if (!username) {
                    showError('usernameError', 'Username is required.');
                    isValid = false;
                } else if (username.length < 3) {
                    showError('usernameError', 'Username must be at least 3 characters.');
                    isValid = false;
                }
                
                // Validate email
                if (!email) {
                    showError('emailError', 'Email is required.');
                    isValid = false;
                } else if (!isValidEmail(email)) {
                    showError('emailError', 'Please enter a valid email address.');
                    isValid = false;
                }
                
                // Validate password
                if (!password) {
                    showError('passwordError', 'Password is required.');
                    isValid = false;
                } else if (password.length < 6) {
                    showError('passwordError', 'Password must be at least 6 characters.');
                    isValid = false;
                }
                
                return isValid;
            }
            
            function showError(elementId, message) {
                const errorElement = document.getElementById(elementId);
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                errorElement.style.color = '#dc3545';
            }

            function showSuccess(elementId, message) {
                const errorElement = document.getElementById(elementId);
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                errorElement.style.color = '#28a745';
            }
            
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // Real-time username availability check with debouncing
            const checkUsernameAvailability = debounce(function() {
                const username = document.getElementById('username').value.trim();
                const error = document.getElementById('usernameError');
                
                // First check basic validation
                if (!username) {
                    showError('usernameError', 'Username is required.');
                    return;
                }
                
                if (username.length < 3) {
                    showError('usernameError', 'Username must be at least 3 characters.');
                    return;
                }
                
                // Make AJAX request to check availability
                fetch('{% url "check_username" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: username })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.available) {
                        showSuccess('usernameError', '✓ ' + data.message);
                    } else {
                        showError('usernameError', '✗ ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error checking username:', error);
                    showError('usernameError', 'Error checking availability');
                });
            }, 500);

            // Real-time email availability check with debouncing
            const checkEmailAvailability = debounce(function() {
                const email = document.getElementById('email').value.trim();
                const error = document.getElementById('emailError');
                
                // First check basic validation
                if (!email) {
                    showError('emailError', 'Email is required.');
                    return;
                }
                
                if (!isValidEmail(email)) {
                    showError('emailError', 'Please enter a valid email address.');
                    return;
                }
                
                // Make AJAX request to check availability
                fetch('{% url "check_email" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.available) {
                        showSuccess('emailError', '✓ ' + data.message);
                    } else {
                        showError('emailError', '✗ ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error checking email:', error);
                    showError('emailError', 'Error checking availability');
                });
            }, 500);

            // Attach input event listeners
            document.getElementById('username').addEventListener('input', function() {
                checkUsernameAvailability();
            });

            document.getElementById('email').addEventListener('input', function() {
                checkEmailAvailability();
            });
            
            document.getElementById('password').addEventListener('input', function() {
                const error = document.getElementById('passwordError');
                if (!this.value.trim()) {
                    showError('passwordError', 'Password is required.');
                } else if (this.value.trim().length < 6) {
                    showError('passwordError', 'Password must be at least 6 characters.');
                } else {
                    error.style.display = 'none';
                }
            });
            
            const themes = [
            {
                background: "#1A1A2E",
                color: "#FFFFFF",
                primaryColor: "#0F3460"
            },
            {
                background: "#461220",
                color: "#FFFFFF",
                primaryColor: "#E94560"
            },
            {
                background: "#192A51",
                color: "#FFFFFF",
                primaryColor: "#967AA1"
            },
            {
                background: "#F7B267",
                color: "#000000",
                primaryColor: "#F4845F"
            },
            {
                background: "#F25F5C",
                color: "#000000",
                primaryColor: "#642B36"
            },
            {
                background: "#231F20",
                color: "#FFF",
                primaryColor: "#BB4430"
            }
        ];

        const setTheme = (theme) => {
            const root = document.querySelector(":root");
            root.style.setProperty("--background", theme.background);
            root.style.setProperty("--color", theme.color);
            root.style.setProperty("--primary-color", theme.primaryColor);
            root.style.setProperty("--glass-color", theme.glassColor);
        };

        const displayThemeButtons = () => {
            const btnContainer = document.querySelector(".theme-btn-container");
            themes.forEach((theme) => {
                const div = document.createElement("div");
                div.className = "theme-btn";
                div.style.cssText = `background: ${theme.background}; width: 25px; height: 25px`;
                btnContainer.appendChild(div);
                div.addEventListener("click", () => setTheme(theme));
            });
        };

        displayThemeButtons();

        </script>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
</html>
